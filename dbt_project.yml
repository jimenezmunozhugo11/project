# ==============================================================================
# dbt_project.yml — football_project
# ==============================================================================
# Central configuration file for the dbt project.
# Defines project metadata, file paths, model materializations and
# database/schema routing per layer.
#
# Layers:
#   staging  → {ENV}_SILVER_SOCCER_DB.EUROPEAN_SOCCER_DATABASE  (views)
#   marts    → {ENV}_GOLD_SOCCER_DB.EUROPEAN_SOCCER_DATABASE    (tables)
#   snapshots→ {ENV}_SILVER_SOCCER_DB.SNAPSHOTS                 (SCD2)
#
# Environment:
#   The DBT_ENVIRONMENTS env var controls the database prefix (e.g. DEV, PRD).
#   If the variable is not set, all database references resolve to FAIL_*
#   to make misconfiguration immediately visible rather than silently writing
#   to an unintended database.
# ==============================================================================

name: 'football_project'
version: '1.0.0'
config-version: 2

# Profile used to connect to Snowflake.
# Defined in ~/.dbt/profiles.yml — not committed to version control.
profile: 'default'

# File path configuration — standard dbt layout, no customisation needed.
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

# Compiled SQL output directory (gitignored).
target-path: "target"

# Directories removed by `dbt clean`.
clean-targets:
  - "target"       # compiled SQL and run artifacts
  - "dbt_packages" # installed dbt packages (reinstalled via `dbt deps`)


# ==============================================================================
# Model configuration
# ==============================================================================
# Materializations and database/schema targets are set per layer here so that
# individual model files only need to override when they differ from the default
# (e.g. fct_match_result overrides to incremental at the model level).
#
# DBT_ENVIRONMENTS drives the database prefix:
#   DEV  → DEV_SILVER_SOCCER_DB  / DEV_GOLD_SOCCER_DB
#   PRO  → PRO_SILVER_SOCCER_DB  / PRO_GOLD_SOCCER_DB
# ==============================================================================

models:
  football_project:

    staging:
      # Silver layer — cleaned and renamed source data.
      # Default: view (no storage cost; queries always reflect latest source).
      # Override to incremental at model level: stg_raw__match.
      +database:     "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_SILVER_SOCCER_DB"
      +schema:       EUROPEAN_SOCCER_DATABASE
      +materialized: view

    marts:
      # Gold layer — dimensional models and fact tables ready for analysis.
      # Default: table (pre-computed for query performance).
      # Override to incremental at model level: fct_match_result.
      +database:     "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_GOLD_SOCCER_DB"
      +schema:       EUROPEAN_SOCCER_DATABASE
      +materialized: table


# ==============================================================================
# Snapshot configuration
# ==============================================================================
# SCD2 snapshots land in the silver layer under a dedicated SNAPSHOTS schema
# to keep them separate from the staging models.
# Covers: team_attributes_snapshot, player_attributes_snapshot.
# ==============================================================================

snapshots:
  football_project:
    +database:       "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_SILVER_SOCCER_DB"
    +schema:         SNAPSHOTS
    +target_schema:  SNAPSHOTS