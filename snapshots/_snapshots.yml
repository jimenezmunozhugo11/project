version: 2

snapshots:
  - name: team_attributes_snapshot
    description: >
      History of tactical attribute changes for teams.
      Captures how each team's playing style evolves over time.
    columns:
      - name: team_api_id
        description: Team identifier.
        tests:
          - not_null
      - name: dbt_scd_id
        description: Surrogate key generated by dbt for each version of the record.
      - name: dbt_updated_at
        description: Timestamp of when this record was last updated.
      - name: dbt_valid_from
        description: Date from which this version of the record is valid.
      - name: dbt_valid_to
        description: Date until which this version of the record is valid (NULL = current version).

  - name: player_attributes_snapshot
    description: >
      History of biographical and performance attributes for players.
      Allows tracking how their characteristics evolve over time.
    columns:
      - name: player_api_id
        description: Player identifier.
        tests:
          - not_null
      - name: dbt_valid_from
        description: Date from which this version is valid.
      - name: dbt_valid_to
        description: Date until which this version is valid (NULL = current version).