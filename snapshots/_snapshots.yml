version: 2

snapshots:
  - name: team_attributes_snapshot
    description: >
      Type-2 slowly changing dimension (SCD2) snapshot of team tactical attributes.
      One record per team per attribute version. Captures the full history of
      tactical changes — each time a team's playing style is updated in the source,
      a new version row is created and the previous one is closed by setting dbt_valid_to.
      Built on top of stg_raw__team_attributes. Current version rows have dbt_valid_to = NULL.
    columns:
      - name: team_api_id
        description: FK to stg_raw__team.team_api_id — identifies the team this version belongs to.
        tests:
          - not_null
      - name: dbt_scd_id
        description: >
          Surrogate key generated by dbt for each individual version of the record.
          Unique across all rows including historical ones — use this as the PK
          when joining to snapshot history.
      - name: dbt_updated_at
        description: Timestamp of the last time this specific row was written or updated by dbt.
      - name: dbt_valid_from
        description: >
          Timestamp from which this version of the team's tactical attributes is valid.
          Corresponds to the date field of the source snapshot that triggered this version.
      - name: dbt_valid_to
        description: >
          Timestamp until which this version is valid.
          NULL = this is the current active version of the team's attributes.
          Non-null = this version has been superseded by a more recent one.

  - name: player_attributes_snapshot
    description: >
      Type-2 slowly changing dimension (SCD2) snapshot of player attributes.
      One record per player per attribute version. Captures the full history of
      attribute changes — each time a player's characteristics are updated in the
      source, a new version row is created and the previous one is closed by
      setting dbt_valid_to. Built on top of stg_raw__player_attributes.
      Current version rows have dbt_valid_to = NULL.
    columns:
      - name: player_api_id
        description: FK to stg_raw__player.player_api_id — identifies the player this version belongs to.
        tests:
          - not_null
      - name: dbt_valid_from
        description: >
          Timestamp from which this version of the player's attributes is valid.
          Corresponds to the date field of the source snapshot that triggered this version.
      - name: dbt_valid_to
        description: >
          Timestamp until which this version is valid.
          NULL = this is the current active version of the player's attributes.
          Non-null = this version has been superseded by a more recent one.