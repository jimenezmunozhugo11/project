version: 2

sources:
  - name: EUROPEAN_SOCCER_DATABASE
    description: >
      Bronze layer — raw data loaded directly from the Kaggle SQLite file
      (European Soccer Database, hugomathien/soccer) without any transformation.
      Covers European football from 2008 to 2016 across 11 leagues.
      All column names and values are preserved exactly as they appear
      in the source; renaming, casting and cleaning happen in the silver layer.
    database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_BRONZE_SOCCER_DB"
    schema: EUROPEAN_SOCCER_DATABASE

    quoting:
      database: false
      schema: false
      identifier: false

    config:
      freshness:
        warn_after:  {count: 7,  period: day}   # default for incremental tables
        error_after: {count: 10, period: day}   # overridden to null for static tables

    tables:

      # ----------------------------------------------------------------
      # STATIC TABLES
      # ----------------------------------------------------------------

      - name: country
        description: >
          Countries where the leagues are held. Static reference table —
          content is fixed for the duration of the dataset.
        config:
          freshness: null
        columns:
          - name: id
            description: Natural PK — uniquely identifies a country in the source system.
            tests: [not_null, unique]
          - name: name
            description: Full country name in English (e.g. Spain, England, Germany).
            tests: [not_null]

      - name: league
        description: >
          European leagues included in the dataset. Static reference table —
          11 leagues across 11 countries, content fixed for the dataset range.
        config:
          freshness: null
        columns:
          - name: id
            description: Natural PK — uniquely identifies a league in the source system.
            tests: [not_null, unique]
          - name: country_id
            description: FK to country.id — links each league to its host country.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'country')
                    field: id
          - name: name
            description: Full official league name (e.g. Spain LIGA BBVA, England Premier League).
            tests: [not_null]

      - name: team
        description: >
          Football teams present in the dataset. Treated as static —
          team rosters change only on promotion or relegation, which
          falls outside the scope of this project.
          Contains two identifiers: id (internal) and team_api_id
          (the main join key used across match and team_attributes).
        config:
          freshness: null
        columns:
          - name: id
            description: Internal surrogate PK — not used as a join key in silver or gold layers.
            tests: [not_null, unique]
          - name: team_api_id
            description: >
              Main team identifier. Used as FK in match (home_team_api_id,
              away_team_api_id) and in team_attributes. This is the primary
              join key for all team-related relationships in the project.
            tests: [not_null, unique]
          - name: team_fifa_api_id
            description: FIFA team ID — present in the source but not carried through to silver.
          - name: team_long_name
            description: Full official team name (e.g. Real Madrid CF, FC Barcelona).
            tests: [not_null]
          - name: team_short_name
            description: Three-letter team abbreviation (e.g. RMA, FCB).

      # ----------------------------------------------------------------
      # SEASONAL SNAPSHOT TABLES — freshness: warn 30d / error 45d
      # ----------------------------------------------------------------

      - name: team_attributes
        description: >
          Team tactical attribute snapshots. One or more records per team
          per season — the source logs a new snapshot each time a team
          changes its tactical setup, approximately once per season.
          The silver layer deduplicates to one record per team per season
          using ROW_NUMBER() on the date column.
          Dropped in silver: team_fifa_api_id, buildupplaydribbling,
          chancecreationcrossing (out of project scope).
        config:
          loaded_at_field: date
          freshness:
            warn_after:  {count: 30, period: day}
            error_after: {count: 45, period: day}
        columns:
          - name: id
            description: Natural PK — uniquely identifies one tactical attribute snapshot.
            tests: [not_null, unique]
          - name: team_api_id
            description: FK to team.team_api_id — identifies the team this snapshot belongs to.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'team')
                    field: team_api_id
          - name: team_fifa_api_id
            description: FIFA team ID — present in the source but not carried through to silver.
          - name: date
            description: >
              Date the snapshot was recorded. Used as the freshness field
              and as the ordering key for the seasonal deduplication
              logic (ROW_NUMBER() ORDER BY date DESC) in silver.
            tests: [not_null]
          - name: buildupplayspeed
            description: Build-up play speed score (0–100).
          - name: buildupplayspeedclass
            description: "Categorical label — Slow / Balanced / Fast."
          - name: buildupplaydribbling
            description: Dribbling tendency during build-up (0–100). Dropped in silver.
          - name: buildupplaydribblingclass
            description: "Categorical label — Little / Normal / Lots. Dropped in silver."
          - name: buildupplaypassing
            description: Passing length preference during build-up (0–100).
          - name: buildupplaypassingclass
            description: "Categorical label — Short / Mixed / Long."
          - name: buildupplaypositioningclass
            description: "Player positioning during build-up — Organised / Free Form."
          - name: chancecreationpassing
            description: Aggressiveness of creative passing in the final third (0–100).
          - name: chancecreationpassingclass
            description: "Categorical label — Safe / Normal / Risky."
          - name: chancecreationcrossing
            description: Crossing tendency in attack (0–100). Dropped in silver.
          - name: chancecreationcrossingclass
            description: "Categorical label — Little / Normal / Lots. Dropped in silver."
          - name: chancecreationshooting
            description: Tendency to attempt a shot when in position (0–100).
          - name: chancecreationshootingclass
            description: "Categorical label — Little / Normal / Lots."
          - name: chancecreationpositioningclass
            description: "Player positioning in the final third — Organised / Free Form."
          - name: defencepressure
            description: Height at which the team applies defensive pressure (0–100).
          - name: defencepressureclass
            description: "Categorical label — Deep / Medium / High."
          - name: defenceaggression
            description: Physical intensity of defensive challenges (0–100).
          - name: defenceaggressionclass
            description: "Categorical label — Contain / Double / Press."
          - name: defenceteamwidth
            description: Width of the team's defensive shape (0–100 — higher = wider).
          - name: defenceteamwidthclass
            description: "Categorical label — Narrow / Normal / Wide."
          - name: defencedefenderlineclass
            description: "Defensive line depth — Cover (deeper line) / Offside Trap (higher line)."

      - name: player
        description: >
          Player biographical data. One record per player.
          No reliable loaded_at column available in the source —
          freshness check disabled. Play style attributes
          (work rates, preferred foot) and FIFA ratings are stored
          separately in player_attributes.
        config:
          freshness: null
        columns:
          - name: id
            description: Internal surrogate PK — not used as a join key in silver or gold layers.
            tests: [not_null, unique]
          - name: player_api_id
            description: >
              Main player identifier. Used as FK in player_attributes.
              This is the primary join key for all player-related
              relationships in the project.
            tests: [not_null, unique]
          - name: player_fifa_api_id
            description: FIFA player ID — present in the source but not carried through to silver.
          - name: player_name
            description: Full player name as recorded in the source system.
            tests: [not_null]
          - name: birthday
            description: >
              Player's date of birth stored as a string in the source.
              Cast to DATE in silver and used to compute the age column
              via DATEDIFF('year', birthday, CURRENT_DATE()).
          - name: height
            description: Player's height in centimetres.
          - name: weight
            description: >
              Player's weight in pounds (Anglo-Saxon origin in the source).
              Converted to kilograms in silver (× 0.453592).

      - name: player_attributes
        description: >
          Player attribute snapshots. One or more records per player
          per season — the source logs a new snapshot after each
          FIFA rating update. The silver layer deduplicates to one
          record per player per season using ROW_NUMBER() on the date column.
          Only 3 columns are carried through to silver: preferred_foot,
          attacking_work_rate and defensive_work_rate.
          All FIFA rating columns (overall_rating, potential, and all
          skill scores) are dropped — they are out of project scope.
        config:
          loaded_at_field: date
          freshness:
            warn_after:  {count: 30, period: day}
            error_after: {count: 45, period: day}
        columns:
          - name: id
            description: Natural PK — uniquely identifies one player attribute snapshot.
            tests: [not_null, unique]
          - name: player_api_id
            description: FK to player.player_api_id — identifies the player this snapshot belongs to.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'player')
                    field: player_api_id
          - name: player_fifa_api_id
            description: FIFA player ID — present in the source but not carried through to silver.
          - name: date
            description: >
              Date the snapshot was recorded. Used as the freshness field
              and as the ordering key for the seasonal deduplication
              logic (ROW_NUMBER() ORDER BY date DESC) in silver.
            tests: [not_null]
          - name: overall_rating
            description: FIFA overall rating (0–100). Not carried through to silver.
          - name: potential
            description: FIFA potential rating (0–100). Not carried through to silver.
          - name: preferred_foot
            description: "Player's dominant foot — left / right. Carried through to silver."
          - name: attacking_work_rate
            description: "Player's offensive effort level — low / medium / high. Carried through to silver."
          - name: defensive_work_rate
            description: "Player's defensive effort level — low / medium / high. Carried through to silver."
          - name: crossing
            description: FIFA crossing skill (0–100). Not carried through to silver.
          - name: finishing
            description: FIFA finishing skill (0–100). Not carried through to silver.
          - name: heading_accuracy
            data_type: number
          - name: short_passing
            data_type: number
          - name: volleys
            data_type: number
          - name: dribbling
            data_type: number
          - name: curve
            data_type: number
          - name: free_kick_accuracy
            data_type: number
          - name: long_passing
            data_type: number
          - name: ball_control
            data_type: number
          - name: acceleration
            data_type: number
          - name: sprint_speed
            data_type: number
          - name: agility
            data_type: number
          - name: reactions
            data_type: number
          - name: balance
            data_type: number
          - name: shot_power
            data_type: number
          - name: jumping
            data_type: number
          - name: stamina
            data_type: number
          - name: strength
            data_type: number
          - name: long_shots
            data_type: number
          - name: aggression
            data_type: number
          - name: interceptions
            data_type: number
          - name: positioning
            data_type: number
          - name: vision
            data_type: number
          - name: penalties
            data_type: number
          - name: marking
            data_type: number
          - name: standing_tackle
            data_type: number
          - name: sliding_tackle
            data_type: number
          - name: gk_diving
            data_type: number
          - name: gk_handling
            data_type: number
          - name: gk_kicking
            data_type: number
          - name: gk_positioning
            data_type: number
          - name: gk_reflexes
            data_type: number

      # ----------------------------------------------------------------
      # INCREMENTAL TABLE — freshness: warn 7d / error 10d
      # ----------------------------------------------------------------

      - name: match
        description: >
          European league matches from 2008 to 2016. The main fact source
          of the project. Updated weekly in the incremental ingestion simulation.
          Columns NOT processed in silver: player position coordinates (x/y),
          XML event columns (goal, card, shoton, shotoff, foulcommit, cross,
          corner, possession) and betting odds from 10 bookmakers
          (B365, BW, IW, LB, PS, WH, SJ, VC, GB, BS — 30 columns total).
          The 22 player lineup columns (home_player_1..11, away_player_1..11)
          are processed separately in stg_raw__match_lineup via UNPIVOT.
        config:
          loaded_at_field: date
          freshness:
            warn_after:  {count: 7,  period: day}
            error_after: {count: 10, period: day}
        columns:
          - name: id
            description: Natural PK — uniquely identifies one match in the source system.
            tests: [not_null, unique]
          - name: country_id
            description: FK to country.id — identifies the country where the match was played.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'country')
                    field: id
          - name: league_id
            description: FK to league.id — identifies the competition this match belongs to.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'league')
                    field: id
          - name: season
            description: >
              Season label in 'YYYY/YYYY' format (e.g. 2015/2016).
              Normalised into a separate season reference table
              (stg_raw__season) in the silver layer via SELECT DISTINCT.
            tests: [not_null]
          - name: stage
            description: League matchday number within the season (e.g. 1 = opening round).
          - name: date
            description: >
              Match date and time. Used as the freshness field and as
              the incremental filter key in stg_raw__match — only rows
              with a date greater than MAX(match_date) in the target
              table are processed on incremental runs.
            tests: [not_null]
          - name: match_api_id
            description: Alternative match identifier present in the source — not used downstream.
          - name: home_team_api_id
            description: FK to team.team_api_id — identifies the home team in this match.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'team')
                    field: team_api_id
          - name: away_team_api_id
            description: FK to team.team_api_id — identifies the away team in this match.
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('EUROPEAN_SOCCER_DATABASE', 'team')
                    field: team_api_id
          - name: home_team_goal
            description: Number of goals scored by the home team. Renamed to home_goals in silver.
            tests: [not_null]
          - name: away_team_goal
            description: Number of goals scored by the away team. Renamed to away_goals in silver.
            tests: [not_null]
          - name: home_player_1
            description: >
              player_api_id of home player 1 (goalkeeper). All 22 player columns
              (home_player_1..11, away_player_1..11) are processed together
              in stg_raw__match_lineup via UNPIVOT — not used directly in silver.
          - name: home_player_2
            data_type: number
          - name: home_player_3
            data_type: number
          - name: home_player_4
            data_type: number
          - name: home_player_5
            data_type: number
          - name: home_player_6
            data_type: number
          - name: home_player_7
            data_type: number
          - name: home_player_8
            data_type: number
          - name: home_player_9
            data_type: number
          - name: home_player_10
            data_type: number
          - name: home_player_11
            data_type: number
          - name: away_player_1
            description: >
              player_api_id of away player 1 (goalkeeper). Processed alongside
              home_player_1..11 in stg_raw__match_lineup via UNPIVOT.
          - name: away_player_2
            data_type: number
          - name: away_player_3
            data_type: number
          - name: away_player_4
            data_type: number
          - name: away_player_5
            data_type: number
          - name: away_player_6
            data_type: number
          - name: away_player_7
            data_type: number
          - name: away_player_8
            data_type: number
          - name: away_player_9
            data_type: number
          - name: away_player_10
            data_type: number
          - name: away_player_11
            data_type: number
          - name: goal
            description: XML blob with match goals (minute, player, type). Not processed in silver.
          - name: shoton
            description: XML blob with shots on target (minute, player, type). Not processed in silver.
          - name: shotoff
            description: XML blob with shots off target. Not processed in silver.
          - name: foulcommit
            description: XML blob with fouls committed (minute, player). Not processed in silver.
          - name: card
            description: XML blob with cards issued (minute, player, card type). Not processed in silver.
          - name: cross
            description: XML blob with crosses attempted. Not processed in silver.
          - name: corner
            description: XML blob with corners taken. Not processed in silver.
          - name: possession
            description: XML blob with possession percentages by period. Not processed in silver.
          - name: b365h
            description: Bet365 home win odds. Not processed in silver.
          - name: b365d
            description: Bet365 draw odds. Not processed in silver.
          - name: b365a
            description: Bet365 away win odds. Not processed in silver.
          - name: bwh
            data_type: number
          - name: bwd
            data_type: number
          - name: bwa
            data_type: number
          - name: iwh
            data_type: number
          - name: iwd
            data_type: number
          - name: iwa
            data_type: number
          - name: lbh
            data_type: number
          - name: lbd
            data_type: number
          - name: lba
            data_type: number
          - name: psh
            data_type: number
          - name: psd
            data_type: number
          - name: psa
            data_type: number
          - name: whh
            data_type: number
          - name: whd
            data_type: number
          - name: wha
            data_type: number
          - name: sjh
            data_type: number
          - name: sjd
            data_type: number
          - name: sja
            data_type: number
          - name: vch
            data_type: number
          - name: vcd
            data_type: number
          - name: vca
            data_type: number
          - name: gbh
            data_type: number
          - name: gbd
            data_type: number
          - name: gba
            data_type: number
          - name: bsh
            data_type: number
          - name: bsd
            data_type: number
          - name: bsa
            data_type: number