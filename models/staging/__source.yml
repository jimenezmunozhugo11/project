version: 2

sources:
  - name: raw
    database: DEMO
    schema: RAW

    quoting:
      database: false
      schema: false
      identifier: false

    config:
      freshness:
        warn_after:  {count: 7,  period: day}
        error_after: {count: 10, period: day}

    tables:

      - name: country
        description: "Countries where the leagues are played"
        config: 
          freshness: null
        columns:
          - name: id
            description: "Country PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: name
            description: "Country name"
            data_type: varchar
            tests:
              - not_null

      - name: league
        description: "Football leagues"
        config: 
          freshness: null
        columns:
          - name: id
            description: "League PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: country_id
            description: "FK a country.id"
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments: 
                    to: source('raw', 'country')
                    field: id
          - name: name
            description: "League name"
            data_type: varchar
            tests:
              - not_null

      - name: team
        description: "Football teams"
        config: 
          freshness: null
        columns:
          - name: id
            description: "Team internal PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: team_api_id
            description: "Team API PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: team_fifa_api_id
            description: "Team FIFA ID"
            data_type: number
          - name: team_long_name
            description: "Name of the club"
            data_type: varchar
            tests:
              - not_null
          - name: team_short_name
            description: "Short name of the club"
            data_type: varchar

      - name: team_attributes
        description: "Team attributes"
        config: 
          loaded_at_field: date
          freshness:
            warn_after:  {count: 30, period: day}
            error_after: {count: 45, period: day}
        columns:
          - name: id
            description: "Team attributes internal PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: team_api_id
            description: "Team API PK"
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'team')
                    field: team_api_id
          - name: team_fifa_api_id
            description: "Team FIFA ID"
            data_type: number
          - name: date
            description: "Tactical snapshot date"
            data_type: timestamp_ntz
            tests:
              - not_null
          - name: buildupplayspeed
            description: "Team build-up speed (0-100)"
            data_type: number
          - name: buildupplayspeedclass
            description: "Team construction speed: Slow / Balanced / Fast"
            data_type: varchar
          - name: buildupplaydribbling
            description: "Team dribbling speed (0-100)"
            data_type: number
          - name: buildupplaydribblingclass
            description: "Dribbling class: Little / Normal / Lots"
            data_type: varchar
          - name: buildupplaypassing
            description: "Passing style during build-up (0-100)"
            data_type: number
          - name: buildupplaypassingclass
            description: "Pass class: Short / Mixed / Long"
            data_type: varchar
          - name: buildupplaypositioningclass
            description: "Positioning under construction: Organised / Free Form"
            data_type: varchar
          - name: chancecreationpassing
            description: "Aggressiveness in construction passing (0-100)"
            data_type: number
          - name: chancecreationpassingclass
            description: "Class of chance creation pass: Safe / Normal / Risky"
            data_type: varchar
          - name: chancecreationcrossing
            description: "Tendency to cross (0-100)"
            data_type: number
          - name: chancecreationcrossingclass
            description: "Cross the ball trend class: Little / Normal / Lots"
            data_type: varchar
          - name: chancecreationshooting
            description: "Tendency to shoot (0-100)"
            data_type: number
          - name: chancecreationshootingclass
            description: "Shoot trend class: Little / Normal / Lots"
            data_type: varchar
          - name: chancecreationpositioningclass
            description: "Attack position: Organised / Free Form"
            data_type: varchar
          - name: defencepressure
            description: "Defence pressure (0-100)"
            data_type: number
          - name: defencepressureclass
            description: "Defence pressure class: Deep / Medium / High"
            data_type: varchar
          - name: defenceaggression
            description: "Defensive aggression (0-100)"
            data_type: number
          - name: defenceaggressionclass
            description: "Aggression class: Conservative / Normal / Pressing"
            data_type: varchar
          - name: defenceteamwidth
            description: "Defensive team width (0-100)"
            data_type: number
          - name: defenceteamwidthclass
            description: "Defence team width class: Narrow / Normal / Wide"
            data_type: varchar
          - name: defencedefenderlineclass
            description: "Defender line depth: Deep / Normal / High"
            data_type: varchar

      - name: player
        description: "Player data"
        config: 
          freshness: null
        columns:
          - name: id
            description: "Player internal PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: player_api_id
            description: "Player PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: player_fifa_api_id
            description: "Player FIFA ID"
            data_type: number
          - name: player_name
            description: "Full name of the player"
            data_type: varchar
            tests:
              - not_null
          - name: birthday
            description: "Player date of birth"
            data_type: timestamp_ntz
          - name: height
            description: "Player height in centimetres"
            data_type: number
          - name: weight
            description: "Player weight in pounds"
            data_type: number

      - name: player_attributes
        description: Player attributes
        config:
          loaded_at_field: date
          freshness:
            warn_after:  {count: 30, period: day}
            error_after: {count: 45, period: day}
        columns:
          - name: id
            description: "Internal PK"
            data_type: number
            tests:
              - not_null
              - unique
          - name: player_api_id
            description: "FK to player.player_api_id."
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'player')
                    field: player_api_id
          - name: player_fifa_api_id
            description: "Player FIFA ID"
            data_type: number
          - name: date
            description: "Attribute snapshot date"
            data_type: timestamp_ntz
            tests:
              - not_null
          - name: overall_rating
            description: "FIFA Overall Rating (0–100)"
            data_type: number
          - name: potential
            description: "FIFA Potencial Rating (0–100)."
            data_type: number
          - name: preferred_foot
            description: "Dominant foot: left / right."
            data_type: varchar
          - name: attacking_work_rate
            description: "Attacking work rate: low / medium / high"
            data_type: varchar
          - name: defensive_work_rate
            description: "Defensive work rate: low / medium / high"
            data_type: varchar
          - name: crossing
            data_type: number
          - name: finishing
            data_type: number
          - name: heading_accuracy
            data_type: number
          - name: short_passing
            data_type: number
          - name: volleys
            data_type: number
          - name: dribbling
            data_type: number
          - name: curve
            data_type: number
          - name: free_kick_accuracy
            data_type: number
          - name: long_passing
            data_type: number
          - name: ball_control
            data_type: number
          - name: acceleration
            data_type: number
          - name: sprint_speed
            data_type: number
          - name: agility
            data_type: number
          - name: reactions
            data_type: number
          - name: balance
            data_type: number
          - name: shot_power
            data_type: number
          - name: jumping
            data_type: number
          - name: stamina
            data_type: number
          - name: strength
            data_type: number
          - name: long_shots
            data_type: number
          - name: aggression
            data_type: number
          - name: interceptions
            data_type: number
          - name: positioning
            data_type: number
          - name: vision
            data_type: number
          - name: penalties
            data_type: number
          - name: marking
            data_type: number
          - name: standing_tackle
            data_type: number
          - name: sliding_tackle
            data_type: number
          - name: gk_diving
            data_type: number
          - name: gk_handling
            data_type: number
          - name: gk_kicking
            data_type: number
          - name: gk_positioning
            data_type: number
          - name: gk_reflexes
            data_type: number

      - name: match
        description: European league matches (2008–2016)
        config:
          loaded_at_field: date
          freshness:
            warn_after:  {count: 7,  period: day}
            error_after: {count: 10, period: day}
        columns:
          - name: id
            description: "Match ID"
            data_type: number
            tests:
              - not_null
              - unique
          - name: country_id
            description: "FK to country.id."
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'country')
                    field: id
          - name: league_id
            description: "FK to league.id."
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'league')
                    field: id
          - name: season
            description: "2015/2016 season format"
            data_type: varchar
            tests:
              - not_null
          - name: stage
            description: "League fixture"
            data_type: number
          - name: date
            description: "Match date"
            data_type: timestamp_ntz
            tests:
              - not_null
          - name: match_api_id
            description: "Match API ID"
            data_type: number
          - name: home_team_api_id
            description: "FK to team.team_api_id - Home team"
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments: 
                    to: source('raw', 'team')
                    field: team_api_id
          - name: away_team_api_id
            description: "FK to team.team_api_id — Away team"
            data_type: number
            tests:
              - not_null
              - relationships:
                  arguments: 
                    to: source('raw', 'team')
                    field: team_api_id
          - name: home_team_goal
            description: "Goals scored by the home team"
            data_type: number
            tests:
              - not_null
          - name: away_team_goal
            description: "Goals scored by the away team"
