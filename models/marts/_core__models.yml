version: 2

models:

  # ----------------------------------------------------------------
  # DIMENSIONS
  # ----------------------------------------------------------------

  - name: dim_date
    description: >
      Date dimension that covers the full dataset range (2008–2016).
      Generated in dbt using Snowflake's GENERATOR function.
      One row per calendar day. Used as the time spine for all
      time-based analyses across the project.
    time_spine:
      standard_granularity_column: day
    columns:
      - name: date_id
        description: Surrogate PK for the date dimension in YYYYMMDD integer format (e.g. 20150831).
        tests: [not_null, unique]
      - name: full_date
        description: Full calendar date as a DATE value (e.g. 2015-08-31).
        tests: [not_null]
      - name: day
        description: Day of the month as an integer (1–31).
        granularity: day
      - name: month
        description: Month of the year as an integer (1–12).
        granularity: month
      - name: month_name
        description: Full month name in English (e.g. January, February).
      - name: quarter
        description: Quarter of the calendar year as an integer (1–4).
        granularity: quarter
      - name: year
        description: Four-digit calendar year (e.g. 2015).
        granularity: year
      - name: day_name
        description: Full day name in English (e.g. Monday, Tuesday).
      - name: is_weekend
        description: Boolean flag — TRUE if the date falls on Saturday or Sunday, FALSE otherwise.

  - name: dim_league
    description: >
      League dimension enriched with the country name from dim_country.
      One record per league. Covers the 11 European leagues
      included in the source dataset.
    columns:
      - name: league_sk
        description: Surrogate PK generated by dbt_utils.generate_surrogate_key.
        tests: [not_null, unique]
      - name: league_id
        description: Natural key from the source system (stg_raw__league.league_id).
        tests: [not_null]
      - name: league_name
        description: Full official name of the league (e.g. Spain LIGA BBVA).
        tests: [not_null]
      - name: country_name
        description: Name of the country where the league is played (e.g. Spain).
        tests: [not_null]

  - name: dim_season
    description: >
      Season dimension. One record per season across all leagues.
      Covers the 8 seasons in the dataset (2008/2009 to 2015/2016).
    columns:
      - name: season_sk
        description: Surrogate PK generated by dbt_utils.generate_surrogate_key.
        tests: [not_null, unique]
      - name: season_id
        description: Natural key from stg_raw__season.
        tests: [not_null]
      - name: season_name
        description: Season label in 'YYYY/YYYY' format (e.g. 2015/2016).
        tests: [not_null, unique]
      - name: start_year
        description: Four-digit year when the season starts (e.g. 2015).
        tests: [not_null]
      - name: end_year
        description: Four-digit year when the season ends (e.g. 2016).
        tests: [not_null]

  - name: dim_team
    description: >
      Team dimension enriched with the most recent available tactical
      attributes from stg_raw__team_attributes. One record per team.
      Tactical attributes reflect the team's last recorded configuration
      in the source dataset, not a point-in-time snapshot.
    columns:
      - name: team_sk
        description: Surrogate PK generated by dbt_utils.generate_surrogate_key.
        tests: [not_null, unique]
      - name: team_api_id
        description: Natural key from the source system (stg_raw__team.team_api_id).
        tests: [not_null]
      - name: team_long_name
        description: Full official name of the team (e.g. Real Madrid CF).
        tests: [not_null]
      - name: team_short_name
        description: Three-letter team abbreviation used in match displays (e.g. RMA).
      - name: buildup_play_speed
        description: Numeric score (0–100) indicating how quickly the team builds up play from defence.
      - name: buildup_play_speed_class
        description: "Categorical label derived from buildup_play_speed — Slow / Balanced / Fast."
        tests:
          - accepted_values:
              arguments:
                values: ['Slow', 'Balanced', 'Fast']
      - name: buildup_play_passing
        description: Numeric score (0–100) indicating the team's passing style during build-up phases.
      - name: buildup_play_passing_class
        description: "Categorical label derived from buildup_play_passing — Short / Mixed / Long."
        tests:
          - accepted_values:
              arguments:
                values: ['Short', 'Mixed', 'Long']
      - name: chance_creation_passing
        description: Numeric score (0–100) indicating the aggressiveness of creative passing in the final third.
      - name: chance_creation_passing_class
        description: "Categorical label derived from chance_creation_passing — Safe / Normal / Risky."
        tests:
          - accepted_values:
              arguments:
                values: ['Safe', 'Normal', 'Risky']
      - name: chance_creation_shooting
        description: Numeric score (0–100) indicating the team's tendency to shoot when an opportunity arises.
      - name: chance_creation_shooting_class
        description: "Categorical label derived from chance_creation_shooting — Little / Normal / Lots."
        tests:
          - accepted_values:
              arguments:
                values: ['Little', 'Normal', 'Lots']
      - name: defence_pressure
        description: Numeric score (0–100) indicating how high up the pitch the team applies defensive pressure.
      - name: defence_pressure_class
        description: "Categorical label derived from defence_pressure — Deep / Medium / High."
        tests:
          - accepted_values:
              arguments:
                values: ['Deep', 'Medium', 'High']
      - name: defence_aggression
        description: Numeric score (0–100) indicating the intensity of the team's defensive challenges.
      - name: defence_aggression_class
        description: "Categorical label derived from defence_aggression — Contain / Double / Press."
        tests:
          - accepted_values:
              arguments:
                values: ['Contain', 'Double', 'Press']
      - name: defence_team_width
        description: Numeric score (0–100) indicating how wide the team defends — higher values mean a wider defensive shape.
      - name: defence_defender_line_class
        description: "Categorical label for the defensive line depth — Cover (deeper line) / Offside Trap (higher line)."
        tests:
          - accepted_values:
              arguments:
                values: ['Cover', 'Offside Trap']

  - name: dim_player
    description: >
      Player dimension enriched with play style attributes from
      stg_raw__player_attributes. One record per player per season.
      FIFA ratings (overall_rating, potential, player_fifa_api_id)
      are explicitly excluded from this model.
    columns:
      - name: player_sk
        description: Surrogate PK derived from the combination of player_api_id and season_id.
        tests: [not_null, unique]
      - name: player_api_id
        description: Natural key from the source system (stg_raw__player.player_api_id).
        tests: [not_null]
      - name: season_sk
        description: FK to dim_season.season_sk — identifies the season this player snapshot belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_sk
      - name: player_name
        description: Full name of the player as recorded in the source system.
        tests: [not_null]
      - name: birthday
        description: Player's date of birth as a DATE value.
      - name: age
        description: Player's age in full years, calculated from birthday relative to the season start date.
      - name: height
        description: Player's height in centimetres.
      - name: weight
        description: Player's weight in pounds (as provided in the source dataset).
      - name: preferred_foot
        description: Player's dominant foot — either 'left' or 'right'.
        tests:
          - accepted_values:
              arguments:
                values: ['left', 'right']
      - name: attacking_work_rate
        description: Player's tendency to contribute offensively — low / medium / high.
        tests:
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']
      - name: defensive_work_rate
        description: Player's tendency to track back and defend — low / medium / high.
        tests:
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']

  # ----------------------------------------------------------------
  # FACT TABLES
  # ----------------------------------------------------------------

  - name: fct_match_result
    description: >
      Match results fact table at match grain. One record per match.
      Contains all match-level metrics (goals, points, result) plus
      foreign keys to all relevant dimensions. Loaded incrementally
      using a merge strategy on match_sk.

    columns:
      - name: match_sk
        description: Surrogate PK generated by dbt_utils.generate_surrogate_key on match_id.
        tests: [not_null, unique]

      - name: match_id
        description: Natural key from the source system (stg_raw__match.match_id).
        tests: [not_null]
        entity:
          type: primary
          name: match

      - name: date_id
        description: FK to dim_date.date_id — links the match to its calendar date.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

      - name: home_team_sk
        description: FK to dim_team.team_sk — identifies the home team in this match.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_sk
        entity:
          type: foreign
          name: home_team

      - name: away_team_sk
        description: FK to dim_team.team_sk — identifies the away team in this match.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_sk
        entity:
          type: foreign
          name: away_team

      - name: league_sk
        description: FK to dim_league.league_sk — identifies the competition this match belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_sk
        entity:
          type: foreign
          name: league

      - name: season_sk
        description: FK to dim_season.season_sk — identifies the season this match was played in.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_sk
        entity:
          type: foreign
          name: season

      - name: match_date
        description: Calendar date on which the match was played (DATE type).
        tests: [not_null]
        granularity: day
        dimension:
          type: time

      - name: stage
        description: League matchday number within the season (e.g. 1 = opening round).
        tests: [not_null]
        dimension:
          type: categorical

      - name: match_result
        description: >
          Final match outcome from the home team's perspective.
          H = home win, D = draw, A = away win.
          Computed via the get_match_result macro.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['H', 'D', 'A']
        dimension:
          type: categorical

      - name: home_goals
        description: Number of goals scored by the home team.
        tests: [not_null]

      - name: away_goals
        description: Number of goals scored by the away team.
        tests: [not_null]

      - name: total_goals
        description: Total goals scored in the match — computed as home_goals + away_goals.
        tests: [not_null]

      - name: goal_diff
        description: >
          Goal difference from the home team's perspective —
          computed as home_goals - away_goals.
          Positive = home team ahead, negative = away team ahead.

      - name: home_points
        description: >
          Points awarded to the home team based on the match result.
          3 = win, 1 = draw, 0 = loss.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]

      - name: away_points
        description: >
          Points awarded to the away team based on the match result.
          3 = win, 1 = draw, 0 = loss.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]

    metrics:
      - name: total_matches
        label: Total matches
        type: simple
        agg: count
        expr: match_id

      - name: total_goals
        label: Total goals
        type: simple
        agg: sum
        expr: total_goals

      - name: total_home_points
        label: Total home points
        type: simple
        agg: sum
        expr: home_points

      - name: total_away_points
        label: Total away points
        type: simple
        agg: sum
        expr: away_points

      - name: avg_goals_per_match
        label: Average goals per match
        type: ratio
        numerator: total_goals
        denominator: total_matches

      - name: home_win_rate
        label: Home win rate
        type: simple
        agg: average
        expr: case when match_result = 'H' then 1.0 else 0.0 end

      - name: away_win_rate
        label: Away win rate
        type: simple
        agg: average
        expr: case when match_result = 'A' then 1.0 else 0.0 end

      - name: draw_rate
        label: Draw rate
        type: simple
        agg: average
        expr: case when match_result = 'D' then 1.0 else 0.0 end

      - name: home_advantage
        label: Home advantage (home win rate minus away win rate)
        type: derived
        expr: home_wr - away_wr
        input_metrics:
          - name: home_win_rate
            alias: home_wr
          - name: away_win_rate
            alias: away_wr

  - name: fct_team_season_stats
    description: >
      Team season stats fact table at team-season grain. One record
      per team per season. All metrics are aggregated from
      fct_match_result — both home and away matches are included.
      Used as the main source for league standings and
      season-over-season performance analyses.

    columns:
      - name: stat_sk
        description: Surrogate PK derived from the combination of team_sk and season_sk.
        tests: [not_null, unique]

      - name: team_sk
        description: FK to dim_team.team_sk — identifies the team this record belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_sk
        entity:
          type: foreign
          name: team

      - name: season_sk
        description: FK to dim_season.season_sk — identifies the season this record covers.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_sk
        entity:
          type: foreign
          name: season

      - name: league_sk
        description: FK to dim_league.league_sk — identifies the league the team competed in this season.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_sk
        entity:
          type: foreign
          name: league

      - name: matches_played
        description: Total number of matches played by the team across the full season (home + away).
        tests: [not_null]

      - name: wins
        description: Total number of matches won by the team during the season.
        tests: [not_null]

      - name: draws
        description: Total number of matches drawn by the team during the season.
        tests: [not_null]

      - name: losses
        description: Total number of matches lost by the team during the season.
        tests: [not_null]

      - name: goals_for
        description: Total goals scored by the team across all matches in the season.
        tests: [not_null]

      - name: goals_against
        description: Total goals conceded by the team across all matches in the season.
        tests: [not_null]

      - name: goal_difference
        description: Net goal difference for the season — computed as goals_for - goals_against.
        tests: [not_null]

      - name: points
        description: Total league points accumulated in the season — computed as (wins × 3) + draws.
        tests: [not_null]

      - name: avg_goals_for
        description: Average goals scored per match across the season (goals_for / matches_played).

      - name: avg_goals_against
        description: Average goals conceded per match across the season (goals_against / matches_played).

      - name: win_rate
        description: Share of matches won during the season — computed as wins / matches_played (0.0–1.0).

    metrics:
      - name: total_wins
        label: Total wins
        type: simple
        agg: sum
        expr: wins

      - name: total_points
        label: Total points
        type: simple
        agg: sum
        expr: points

      - name: total_goals_for
        label: Total goals scored
        type: simple
        agg: sum
        expr: goals_for

      - name: total_goals_against
        label: Total goals conceded
        type: simple
        agg: sum
        expr: goals_against

      - name: total_matches_played
        label: Total matches played
        type: simple
        agg: sum
        expr: matches_played

      - name: avg_team_points
        label: Average points per team per season
        type: simple
        agg: average
        expr: points

      - name: avg_team_win_rate
        label: Average win rate per team per season
        type: simple
        agg: average
        expr: win_rate

      - name: avg_team_goals_for
        label: Average goals scored per team per season
        type: simple
        agg: average
        expr: goals_for

      - name: points_per_match
        label: Average points earned per match played
        type: ratio
        numerator: total_points
        denominator: total_matches_played

      - name: goal_conversion_rate
        label: Ratio of goals scored to goals conceded
        type: derived
        expr: scored / conceded
        input_metrics:
          - name: total_goals_for
            alias: scored
          - name: total_goals_against
            alias: conceded

  - name: fct_team_consistency
    description: >
      Team consistency analysis at team-season grain. One record per
      team per season. Uses STDDEV() to measure how consistently a
      team scores goals across its matches — low standard deviation
      indicates a reliable scorer, high standard deviation indicates
      an erratic one. Built by unpivoting fct_match_result into one
      row per team per match. Only teams with 10 or more matches in
      a season are included (enforced via HAVING clause).

    columns:
      - name: league_name
        description: Full name of the league — sourced from dim_league.league_name.
        tests: [not_null]

      - name: season
        description: Season label in 'YYYY/YYYY' format — sourced from dim_season.season_name.
        tests: [not_null]

      - name: team_long_name
        description: Full name of the team — sourced from dim_team.team_long_name.
        tests: [not_null]

      - name: matches_played
        description: Total matches included in this team's consistency calculation. Minimum 10 (enforced by HAVING).
        tests: [not_null]

      - name: avg_goals_per_match
        description: Average number of goals scored per match by the team in this season.

      - name: stddev_goals
        description: >
          Standard deviation of goals scored per match during the season.
          Low value = consistent scoring output.
          High value = erratic, unpredictable scoring output.

      - name: min_goals_in_a_match
        description: Fewest goals scored by the team in a single match across the season.

      - name: max_goals_in_a_match
        description: Most goals scored by the team in a single match across the season.

      - name: rank_most_consistent
        description: >
          Rank within league + season ordered by stddev_goals ASC.
          Rank 1 = most consistent team (lowest scoring variance).

      - name: rank_most_erratic
        description: >
          Rank within league + season ordered by stddev_goals DESC.
          Rank 1 = most erratic team (highest scoring variance).

    metrics:
      - name: avg_stddev_goals
        label: Average goal-scoring standard deviation across teams
        type: simple
        agg: average
        expr: stddev_goals

      - name: avg_goals_scored
        label: Average goals scored per match across teams
        type: simple
        agg: average
        expr: avg_goals_per_match

  - name: fct_team_evolution
    description: >
      Team season-over-season evolution at team-season grain. One record
      per team per season. Uses LAG() window function to calculate
      year-over-year deltas for points, goals scored, goals conceded, and
      league position. NULL delta values are expected and valid for a
      team's first season in the dataset — no previous season exists to
      compare against. Sources — fct_team_season_stats, dim_team,
      dim_season, dim_league.

    columns:
      - name: league_name
        description: Full name of the league — sourced from dim_league.league_name.
        tests: [not_null]

      - name: team_long_name
        description: Full name of the team — sourced from dim_team.team_long_name.
        tests: [not_null]

      - name: season
        description: Season label in 'YYYY/YYYY' format — sourced from dim_season.season_name.
        tests: [not_null]

      - name: matches_played
        description: Total matches played by the team in this season.
        tests: [not_null]

      - name: points
        description: Total league points earned by the team in this season.
        tests: [not_null]

      - name: points_delta
        description: >
          Change in points vs the previous season in the same league.
          Positive = more points (improvement). Negative = fewer points (decline).
          NULL for a team's first season in the dataset.

      - name: goals_for
        description: Total goals scored by the team in this season.
        tests: [not_null]

      - name: goals_for_delta
        description: >
          Change in goals scored vs the previous season.
          Positive = more goals scored. Negative = fewer goals scored.
          NULL for a team's first season in the dataset.

      - name: goals_against
        description: Total goals conceded by the team in this season.
        tests: [not_null]

      - name: goals_against_delta
        description: >
          Change in goals conceded vs the previous season.
          Negative = fewer goals conceded (defensive improvement).
          Positive = more goals conceded (defensive decline).
          NULL for a team's first season in the dataset.

      - name: goal_difference
        description: Net goal difference for the season — computed as goals_for - goals_against.
        tests: [not_null]

      - name: wins
        description: Total wins recorded by the team in this season.
        tests: [not_null]

      - name: draws
        description: Total draws recorded by the team in this season.
        tests: [not_null]

      - name: losses
        description: Total losses recorded by the team in this season.
        tests: [not_null]

      - name: league_position
        description: >
          Final league table position for the season.
          Ranked by points DESC, then goal_difference DESC as tiebreaker.
          Position 1 = league champion.
        tests: [not_null]

      - name: position_delta
        description: >
          Change in league position vs the previous season.
          Negative = climbed the table (improvement).
          Positive = dropped down the table (decline).
          NULL for a team's first season in the dataset.

    metrics:
      - name: avg_points_delta
        label: Average points change season over season
        type: simple
        agg: average
        expr: points_delta

      - name: avg_position_delta
        label: Average position change season over season
        type: simple
        agg: average
        expr: position_delta