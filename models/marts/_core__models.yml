version: 2

models:

  # ----------------------------------------------------------------
  # DIMENSIONS
  # ----------------------------------------------------------------

  - name: dim_date
    description: Date dimension covering the full dataset range (2008-2016). Generated in dbt using Snowflake GENERATOR. One row per day.
    time_spine:
      standard_granularity_column: day
    columns:
      - name: date_id
        description: Date PK in YYYYMMDD format.
        tests: [not_null, unique]
      - name: full_date
        description: Full date value.
        tests: [not_null]
      - name: day
        description: Day of the month.
        granularity: day
      - name: month
        description: Month number.
        granularity: month
      - name: month_name
        description: Month name (e.g. January).
      - name: quarter
        description: Quarter of the year (1-4).
        granularity: quarter
      - name: year
        description: Calendar year.
        granularity: year
      - name: day_name
        description: Day name (e.g. Monday).
      - name: is_weekend
        description: TRUE if the date falls on Saturday or Sunday.

  - name: dim_league
    description: League dimension enriched with country name. One record per league.
    columns:
      - name: league_sk
        description: Surrogate PK.
        tests: [not_null, unique]
      - name: league_id
        description: Natural key from the source system.
        tests: [not_null]
      - name: league_name
        description: Full name of the league.
        tests: [not_null]
      - name: country_name
        description: Name of the country where the league is held.
        tests: [not_null]

  - name: dim_season
    description: Season dimension. One record per season.
    columns:
      - name: season_sk
        description: Surrogate PK.
        tests: [not_null, unique]
      - name: season_id
        description: Natural key from stg_raw__season.
        tests: [not_null]
      - name: season_name
        description: Season name in '2015/2016' format.
        tests: [not_null, unique]
      - name: start_year
        description: Season start year.
        tests: [not_null]
      - name: end_year
        description: Season end year.
        tests: [not_null]

  - name: dim_team
    description: Team dimension enriched with most recent tactical attributes. One record per team.
    columns:
      - name: team_sk
        description: Surrogate PK.
        tests: [not_null, unique]
      - name: team_api_id
        description: Natural key from the source system.
        tests: [not_null]
      - name: team_long_name
        description: Full name of the team.
        tests: [not_null]
      - name: team_short_name
        description: Team abbreviation (3 letters).
      - name: buildup_play_speed
        description: Build-up play speed (0-100).
      - name: buildup_play_speed_class
        description: "Speed class: Slow / Balanced / Fast."
        tests:
          - accepted_values:
              arguments:
                values: ['Slow', 'Balanced', 'Fast']
      - name: buildup_play_passing
        description: Passing style during build-up (0-100).
      - name: buildup_play_passing_class
        description: "Passing class: Short / Mixed / Long."
        tests:
          - accepted_values:
              arguments:
                values: ['Short', 'Mixed', 'Long']
      - name: chance_creation_passing
        description: Aggressiveness of creative passes (0-100).
      - name: chance_creation_passing_class
        description: "Passing class: Safe / Normal / Risky."
        tests:
          - accepted_values:
              arguments:
                values: ['Safe', 'Normal', 'Risky']
      - name: chance_creation_shooting
        description: Tendency to shoot (0-100).
      - name: chance_creation_shooting_class
        description: "Shooting class: Little / Normal / Lots."
        tests:
          - accepted_values:
              arguments:
                values: ['Little', 'Normal', 'Lots']
      - name: defence_pressure
        description: Defensive pressure (0-100).
      - name: defence_pressure_class
        description: "Pressure class: Deep / Medium / High."
        tests:
          - accepted_values:
              arguments:
                values: ['Deep', 'Medium', 'High']
      - name: defence_aggression
        description: Defensive aggression (0-100).
      - name: defence_aggression_class
        description: "Aggression class: Contain / Double / Press."
        tests:
          - accepted_values:
              arguments:
                values: ['Contain', 'Double', 'Press']
      - name: defence_team_width
        description: Defensive team width (0-100).
      - name: defence_defender_line_class
        description: "Defender line depth: Cover / Offside Trap."
        tests:
          - accepted_values:
              arguments:
                values: ['Cover', 'Offside Trap']

  - name: dim_player
    description: Player dimension enriched with play style attributes. One record per player and season. FIFA ratings excluded.
    columns:
      - name: player_sk
        description: Surrogate PK (player_api_id + season_id).
        tests: [not_null, unique]
      - name: player_api_id
        description: Natural key from the source system.
        tests: [not_null]
      - name: season_sk
        description: FK to dim_season.season_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_sk
      - name: player_name
        description: Full name of the player.
        tests: [not_null]
      - name: birthday
        description: Date of birth.
      - name: age
        description: Age calculated from birthday.
      - name: height
        description: Height in centimeters.
      - name: weight
        description: Weight in pounds.
      - name: preferred_foot
        description: Dominant foot.
        tests:
          - accepted_values:
              arguments:
                values: ['left', 'right']
      - name: attacking_work_rate
        description: Offensive work rate.
        tests:
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']
      - name: defensive_work_rate
        description: Defensive work rate.
        tests:
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']

  # ----------------------------------------------------------------
  # FACT TABLES
  # ----------------------------------------------------------------

  - name: fct_match_result
    description: Match results fact table. One record per match. Incremental (merge on match_sk).

    columns:
      - name: match_sk
        description: Surrogate PK.
        tests: [not_null, unique]

      - name: match_id
        description: Natural key from the source system.
        tests: [not_null]
        entity:
          type: primary
          name: match

      - name: date_id
        description: FK to dim_date.date_id.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id

      - name: home_team_sk
        description: FK to dim_team.team_sk — home team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_sk
        entity:
          type: foreign
          name: home_team

      - name: away_team_sk
        description: FK to dim_team.team_sk — away team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_sk
        entity:
          type: foreign
          name: away_team

      - name: league_sk
        description: FK to dim_league.league_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_sk
        entity:
          type: foreign
          name: league

      - name: season_sk
        description: FK to dim_season.season_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_sk
        entity:
          type: foreign
          name: season

      - name: match_date
        description: Date the match was played.
        tests: [not_null]
        granularity: day
        dimension:
          type: time

      - name: stage
        description: League matchday.
        tests: [not_null]
        dimension:
          type: categorical

      - name: match_result
        description: Match outcome — H (home win) / D (draw) / A (away win).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['H', 'D', 'A']
        dimension:
          type: categorical

      - name: home_goals
        description: Goals scored by the home team.
        tests: [not_null]

      - name: away_goals
        description: Goals scored by the away team.
        tests: [not_null]

      - name: total_goals
        description: Total goals in the match (home_goals + away_goals).
        tests: [not_null]

      - name: goal_diff
        description: Goal difference from the home team perspective (home_goals - away_goals).

      - name: home_points
        description: Points earned by the home team — 3 (win) / 1 (draw) / 0 (loss).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]

      - name: away_points
        description: Points earned by the away team — 3 (win) / 1 (draw) / 0 (loss).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]

    metrics:
      - name: total_matches
        label: Total matches
        type: simple
        agg: count
        expr: match_id

      - name: total_goals
        label: Total goals
        type: simple
        agg: sum
        expr: total_goals

      - name: total_home_points
        label: Total home points
        type: simple
        agg: sum
        expr: home_points

      - name: total_away_points
        label: Total away points
        type: simple
        agg: sum
        expr: away_points

      - name: avg_goals_per_match
        label: Average goals per match
        type: ratio
        numerator: total_goals
        denominator: total_matches

      - name: home_win_rate
        label: Home win rate
        type: simple
        agg: average
        expr: case when match_result = 'H' then 1.0 else 0.0 end

      - name: away_win_rate
        label: Away win rate
        type: simple
        agg: average
        expr: case when match_result = 'A' then 1.0 else 0.0 end

      - name: draw_rate
        label: Draw rate
        type: simple
        agg: average
        expr: case when match_result = 'D' then 1.0 else 0.0 end

      - name: home_advantage
        label: Home advantage (home win rate vs away win rate)
        type: derived
        expr: home_wr - away_wr
        input_metrics:
          - name: home_win_rate
            alias: home_wr
          - name: away_win_rate
            alias: away_wr

#      - name: total_goals_l30d
#        label: Total goals last 30 days
#        type: cumulative
#        type_params:
#          measure:
#            name: total_goals
#          cumulative_type_params:
#            window: 30 days

  # ----------------------------------------------------------------

  - name: fct_team_season_stats
    description: Team season stats fact table. One record per team and season. Aggregated from fct_match_result.

    columns:
      - name: stat_sk
        description: Surrogate PK (team_sk + season_sk).
        tests: [not_null, unique]

      - name: team_sk
        description: FK to dim_team.team_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_sk
        entity:
          type: foreign
          name: team

      - name: season_sk
        description: FK to dim_season.season_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_sk
        entity:
          type: foreign
          name: season

      - name: league_sk
        description: FK to dim_league.league_sk.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_sk
        entity:
          type: foreign
          name: league

      - name: matches_played
        description: Total matches played in the season.
        tests: [not_null]

      - name: wins
        description: Total wins in the season.
        tests: [not_null]

      - name: draws
        description: Total draws in the season.
        tests: [not_null]

      - name: losses
        description: Total losses in the season.
        tests: [not_null]

      - name: goals_for
        description: Total goals scored in the season.
        tests: [not_null]

      - name: goals_against
        description: Total goals conceded in the season.
        tests: [not_null]

      - name: goal_difference
        description: Season goal difference (goals_for - goals_against).
        tests: [not_null]

      - name: points
        description: Total points in the season (wins*3 + draws).
        tests: [not_null]

      - name: avg_goals_for
        description: Average goals scored per match.

      - name: avg_goals_against
        description: Average goals conceded per match.

      - name: win_rate
        description: Win rate for the season (wins / matches_played).

    metrics:
      - name: total_wins
        label: Total wins
        type: simple
        agg: sum
        expr: wins

      - name: total_points
        label: Total points
        type: simple
        agg: sum
        expr: points

      - name: total_goals_for
        label: Total goals scored
        type: simple
        agg: sum
        expr: goals_for

      - name: total_goals_against
        label: Total goals conceded
        type: simple
        agg: sum
        expr: goals_against

      - name: total_matches_played
        label: Total matches played
        type: simple
        agg: sum
        expr: matches_played

      - name: avg_team_points
        label: Average points per team
        type: simple
        agg: average
        expr: points

      - name: avg_team_win_rate
        label: Average win rate per team
        type: simple
        agg: average
        expr: win_rate

      - name: avg_team_goals_for
        label: Average goals scored per team
        type: simple
        agg: average
        expr: goals_for

      - name: points_per_match
        label: Points per match played
        type: ratio
        numerator: total_points
        denominator: total_matches_played

      - name: goal_conversion_rate
        label: Goal conversion rate (scored vs conceded)
        type: derived
        expr: scored / conceded
        input_metrics:
          - name: total_goals_for
            alias: scored
          - name: total_goals_against
            alias: conceded
        
